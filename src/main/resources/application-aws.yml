spring:
  application:
    name: toxic-bet

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_AWS_HOST:${POSTGRES_DOCKER_HOST:postgres}}:${POSTGRES_AWS_PORT:${POSTGRES_DOCKER_PORT:5432}}/${POSTGRES_AWS_DB:${POSTGRES_DOCKER_DB}}
    username: ${POSTGRES_AWS_USER:${POSTGRES_DOCKER_USER}}
    password: ${POSTGRES_AWS_PASSWORD:${POSTGRES_DOCKER_PASSWORD}}

  flyway:
    url: jdbc:postgresql://${POSTGRES_AWS_HOST:${POSTGRES_DOCKER_HOST:postgres}}:${POSTGRES_AWS_PORT:${POSTGRES_DOCKER_PORT:5432}}/${POSTGRES_AWS_DB:${POSTGRES_DOCKER_DB}}
    user: ${POSTGRES_AWS_USER:${POSTGRES_DOCKER_USER}}
    password: ${POSTGRES_AWS_PASSWORD:${POSTGRES_DOCKER_PASSWORD}}
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_AWS_JWK_SET_URI:${AUTH_SERVER_JWK_SET_URI:https://auth.toxicbet.com.br/auth-server/public-key/jwks}}
          jwk-cache-lifespan: 3600000
          connect-timeout: 30000
          read-timeout: 30000

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=1h

server:
  port: 20000

logging:
  level:
    org.springframework.security: INFO
    br.com.hahn.toxicbet: INFO
