spring:
  application:
    name: toxic-bet

  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_DOCKER_HOST:postgres}:${POSTGRES_DOCKER_PORT:5432}/${POSTGRES_DOCKER_DB}
    username: ${POSTGRES_DOCKER_USER}
    password: ${POSTGRES_DOCKER_PASSWORD}

  flyway:
    url: jdbc:postgresql://${POSTGRES_DOCKER_HOST:postgres}:${POSTGRES_DOCKER_PORT:5432}/${POSTGRES_DOCKER_DB}
    user: ${POSTGRES_DOCKER_USER}
    password: ${POSTGRES_DOCKER_PASSWORD}
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVER_JWK_SET_URI:http://ms-auth-server:2300/auth-server/public-key/jwks}
          jwk-cache-lifespan: 3600000
          connect-timeout: 30000
          read-timeout: 30000

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=1h

server:
  port: 20000

logging:
  level:
    root: ERROR
    reactor.netty.http.client: ERROR
    org.springframework.security: ERROR
    br.com.hahn.toxicbet: ERROR

integration:
  auth:
    base-url: ${AUTH_SERVER_BASE_URL:http://ms-auth-server:2300}
    application-public-id: ${APPLICATION_ID}

notifications:
  push:
    enabled: ${PUSH_NOTIFICATIONS_ENABLED:true}
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    vapid-subject: ${VAPID_SUBJECT:mailto:guilherme.f.h@hotmail.com}
    ttl-seconds: ${PUSH_NOTIFICATION_TTL_SECONDS:3600}
    send-concurrency: ${PUSH_NOTIFICATION_SEND_CONCURRENCY:8}
