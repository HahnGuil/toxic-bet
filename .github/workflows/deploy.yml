name: Build and deploy toxic-bet-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_NAME="ghcr.io/${OWNER}/toxic-bet"
          IMAGE="${IMAGE_NAME}:${GITHUB_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_NAME }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Kubernetes rollout
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Call deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          IMAGE: ${{ needs.build.outputs.image }}
          SHA: ${{ github.sha }}
          DEPLOYMENT: toxic-bet-api
        run: |
          test -n "$DEPLOY_WEBHOOK_URL"
          test -n "$DEPLOY_WEBHOOK_TOKEN"
          curl --fail --show-error --silent \
            --request POST "$DEPLOY_WEBHOOK_URL" \
            --header "Content-Type: application/json" \
            --header "X-Deploy-Token: $DEPLOY_WEBHOOK_TOKEN" \
            --data "{\"deployment\":\"$DEPLOYMENT\",\"image\":\"$IMAGE\",\"sha\":\"$SHA\",\"repository\":\"$GITHUB_REPOSITORY\",\"run_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
