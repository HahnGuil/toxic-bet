name: Git Flow Guard

on:
  pull_request:
    branches:
      - main
      - development

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch flow
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "The source branch must be up to date with main before it can be merged."
            echo "Update it with: git fetch origin && git rebase origin/main"
            exit 1
          fi

          if [ "$BASE_REF" = "main" ]; then
            if [ "$HEAD_REF" != "development" ]; then
              echo "Only development can be merged into main. Current source: $HEAD_REF"
              exit 1
            fi
            if [ "$ACTOR" != "HahnGuil" ]; then
              echo "Only HahnGuil can open production merge requests. Current actor: $ACTOR"
              exit 1
            fi
          fi

          if [ "$BASE_REF" = "development" ]; then
            case "$HEAD_REF" in
              feature/*) ;;
              *)
                echo "Only feature/* branches can be merged into development. Current source: $HEAD_REF"
                exit 1
                ;;
            esac
          fi
