services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toxic-bet-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DOCKER_HOST: postgres
      POSTGRES_DOCKER_PORT: 5432
      POSTGRES_DOCKER_USER: ${POSTGRES_DOCKER_USER}
      POSTGRES_DOCKER_PASSWORD: ${POSTGRES_DOCKER_PASSWORD}
      POSTGRES_DOCKER_DB: ${POSTGRES_DOCKER_DB}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      AUTH_SERVER_JWK_SET_URI: ${AUTH_SERVER_JWK_SET_URI:-http://auth-server:2300/auth-server/public-key/jwks}
    ports:
      - "20000:20000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - toxic-bet-net
      - shared-services

  postgres:
    image: postgres:16
    container_name: toxic-bet-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_DOCKER_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DOCKER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DOCKER_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_DOCKER_PORT:-5440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DOCKER_USER} -d ${POSTGRES_DOCKER_DB} -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - toxic-bet-net
volumes:
  postgres_data:

networks:
  toxic-bet-net:
    name: toxic-bet-net
  shared-services:
    external: true
    name: ${SHARED_SERVICES_NETWORK:-shared-services}
