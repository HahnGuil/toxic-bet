services:
  postgres-local:
    image: postgres:16
    container_name: toxic-bet-local-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_DEV_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DEV_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEV_DB}
    ports:
      - "127.0.0.1:${POSTGRES_DEV_PORT:-5435}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DEV_USER} -d ${POSTGRES_DEV_DB} -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local_data:

